<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson 3: An Eye for Art - Vocabulary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', 'Noto Sans KR', sans-serif; overflow: hidden; touch-action: manipulation; }
        
        /* 3D Flip Card Styles */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transition-transform-700 { transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        /* Details Fade In */
        .details-hidden { opacity: 0; transform: translateY(15px); pointer-events: none; height: 0; overflow: hidden; margin-top: 0; }
        .details-visible { opacity: 1; transform: translateY(0); pointer-events: auto; height: auto; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); margin-top: 1rem; }

        /* Fancy Gradients */
        .bg-gradient-card-front { background: linear-gradient(to right bottom, #ffffff, #fdfbfb); }
        .bg-gradient-card-back { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px) rotate(-2deg); }
            40% { transform: translateX(6px) rotate(2deg); }
            60% { transform: translateX(-6px) rotate(-2deg); }
            80% { transform: translateX(6px) rotate(2deg); }
        }
        .shake-animation { animation: shake 0.4s ease-in-out; }
        
        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-animation { animation: popOut 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .float-animation { animation: float 3s ease-in-out infinite; }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Game Card Styles (Memory Game) */
        .memory-card { cursor: pointer; }
        .memory-card-inner {
            transition: transform 0.5s;
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .memory-card.flipped .memory-card-inner { transform: rotateY(180deg); }
        .memory-card-front, .memory-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .memory-card-front { background: linear-gradient(135deg, #a78bfa 0%, #c084fc 100%); color: white; font-size: 2rem; }
        .memory-card-back { background-color: white; transform: rotateY(180deg); border: 2px solid #ddd6fe; font-weight: 700; word-break: keep-all; color: #4c1d95; }
        .matched .memory-card-back { background-color: #dcfce7; border-color: #4ade80; color: #166534; }
    </style>
</head>
<body class="bg-indigo-50/50 h-screen w-screen flex flex-col text-slate-700">

    <!-- Header (Fixed Height) -->
    <header class="flex-shrink-0 bg-white/80 backdrop-blur-md shadow-sm border-b border-indigo-50">
        <div class="max-w-5xl mx-auto px-4 py-2 sm:py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-gradient-to-br from-pink-300 to-purple-400 rounded-xl flex items-center justify-center text-white shadow-sm transform -rotate-6">
                    <i class="fa-solid fa-palette text-xl sm:text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-lg sm:text-xl font-black text-slate-800 tracking-tight leading-none">An Eye for Art</h1>
                    <p class="text-[10px] sm:text-xs text-purple-500 font-bold tracking-widest uppercase mt-0.5 sm:mt-1">Lesson 3 Vocab</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Navigation Tabs (Fixed Height) -->
    <div class="flex-shrink-0 max-w-5xl w-full mx-auto px-2 sm:px-4 mt-2 sm:mt-4">
        <div class="flex bg-white rounded-xl p-1 shadow-sm border border-slate-100 gap-1 overflow-x-auto no-scrollbar">
            <button onclick="switchTab('learn')" id="tab-learn" class="flex-1 min-w-[80px] py-2 sm:py-2.5 px-2 rounded-lg font-bold text-xs sm:text-sm transition-all duration-300 bg-gradient-to-r from-purple-100 to-pink-100 text-purple-700 shadow-sm whitespace-nowrap">
                <i class="fa-solid fa-layer-group mr-1"></i>단어장
            </button>
            <button onclick="switchTab('example')" id="tab-example" class="flex-1 min-w-[80px] py-2 sm:py-2.5 px-2 rounded-lg font-bold text-xs sm:text-sm transition-all duration-300 text-slate-500 hover:bg-slate-50 hover:text-slate-800 whitespace-nowrap">
                <i class="fa-solid fa-pen-nib mr-1"></i>예문학습
            </button>
            <button onclick="switchTab('quiz')" id="tab-quiz" class="flex-1 min-w-[80px] py-2 sm:py-2.5 px-2 rounded-lg font-bold text-xs sm:text-sm transition-all duration-300 text-slate-500 hover:bg-slate-50 hover:text-slate-800 whitespace-nowrap">
                <i class="fa-solid fa-check-double mr-1"></i>퀴즈
            </button>
            <button onclick="switchTab('game')" id="tab-game" class="flex-1 min-w-[80px] py-2 sm:py-2.5 px-2 rounded-lg font-bold text-xs sm:text-sm transition-all duration-300 text-slate-500 hover:bg-slate-50 hover:text-slate-800 whitespace-nowrap">
                <i class="fa-solid fa-gamepad mr-1"></i>게임
            </button>
        </div>
    </div>

    <!-- Main Content Area (Fills remaining height, no scroll) -->
    <main class="flex-1 min-h-0 w-full max-w-5xl mx-auto px-4 py-4 flex flex-col justify-center relative">
        
        <!-- SECTION: LEARN (Word Cards) -->
        <section id="sec-learn" class="w-full h-full max-w-lg mx-auto flex flex-col justify-center">
            <div class="perspective-1000 w-full flex flex-col h-[90%] sm:h-[85%]">
                <!-- Controls -->
                <div class="flex justify-between items-center mb-3 sm:mb-4 px-1 flex-shrink-0">
                    <div class="bg-white border border-slate-200 px-3 py-1 rounded-full shadow-sm flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                        <span class="text-xs sm:text-sm font-black text-slate-600" id="card-counter">1 / 26</span>
                    </div>
                    <button onclick="shuffleCards()" class="text-xs sm:text-sm font-bold text-purple-600 bg-purple-50 hover:bg-purple-100 px-3 py-1 rounded-full transition-all shadow-sm flex items-center gap-1.5">
                        <i class="fa-solid fa-dice"></i> 섞기
                    </button>
                </div>
                
                <!-- Flashcard -->
                <div id="flashcard" class="relative w-full flex-1 transform-style-3d transition-transform-700 cursor-pointer min-h-0">
                    
                    <!-- Front (English) -->
                    <div onclick="handleCardClick('front')" class="absolute w-full h-full backface-hidden bg-gradient-card-front border-2 border-slate-100 rounded-3xl flex flex-col items-center justify-center p-6 text-center shadow-lg transition-all duration-300">
                        <div class="w-12 h-12 sm:w-16 sm:h-16 bg-purple-100 text-purple-500 rounded-full flex items-center justify-center text-2xl sm:text-3xl mb-4 float-animation shadow-inner flex-shrink-0">
                            <i class="fa-solid fa-language"></i>
                        </div>
                        <h2 id="card-eng" class="text-4xl sm:text-6xl font-black text-slate-800 mb-4 sm:mb-6 tracking-tight break-words px-2"></h2>
                        <div class="bg-slate-100 px-4 py-2 rounded-full text-slate-500 font-bold text-xs flex items-center gap-2 mt-auto sm:mt-0">
                            <i class="fa-solid fa-hand-pointer text-purple-400 animate-pulse"></i> 뜻 확인하기
                        </div>
                    </div>
                    
                    <!-- Back (Korean & Def) -->
                    <div onclick="handleCardClick('back')" class="absolute w-full h-full backface-hidden bg-gradient-card-back text-white rounded-3xl rotate-y-180 flex flex-col items-center justify-center p-6 text-center shadow-xl border border-white/20 overflow-hidden">
                        
                        <!-- Korean Meaning (Dynamic Size) -->
                        <h3 id="card-kor" class="text-5xl sm:text-6xl font-black text-white drop-shadow-md z-10 transition-all duration-500 mb-0 leading-tight"></h3>
                        
                        <!-- Hidden: Definition -->
                        <div id="card-def-container" class="details-hidden w-full z-10 flex flex-col gap-2">
                            <div class="w-full bg-white/20 rounded-2xl p-4 sm:p-5 backdrop-blur-md border border-white/30 text-left shadow-inner">
                                <p class="text-xs text-purple-100 uppercase tracking-widest mb-2 font-bold flex items-center gap-2"><i class="fa-solid fa-book-open"></i> 영영 풀이</p>
                                <p id="card-def" class="text-sm sm:text-lg font-bold leading-snug text-white drop-shadow-sm"></p>
                            </div>
                        </div>
                        
                        <!-- Instruction -->
                        <div id="card-instruction" class="mt-auto z-10 text-white/80 text-xs sm:text-sm font-bold flex items-center gap-2">
                            <i class="fa-solid fa-hand-pointer animate-pulse"></i> <span>클릭해서 영영풀이 보기</span>
                        </div>
                    </div>
                </div>

                <!-- Navigation Controls -->
                <div class="flex justify-between items-center mt-3 sm:mt-4 gap-3 flex-shrink-0">
                    <button onclick="prevCard()" class="flex-1 bg-white border-2 border-slate-200 text-slate-500 font-black text-sm sm:text-base py-3 rounded-xl shadow-sm active:scale-95 flex justify-center items-center gap-2">
                        <i class="fa-solid fa-chevron-left"></i> 이전
                    </button>
                    <button onclick="nextCard()" class="flex-1 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-black text-sm sm:text-base py-3 rounded-xl shadow-md active:scale-95 flex justify-center items-center gap-2">
                        다음 <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- SECTION: EXAMPLE (Flashcard Mode) -->
        <section id="sec-example" class="hidden w-full h-full max-w-lg mx-auto flex flex-col justify-center">
            <div class="perspective-1000 w-full flex flex-col h-[90%] sm:h-[85%]">
                
                <!-- Controls -->
                <div class="flex justify-between items-center mb-3 sm:mb-4 px-1 flex-shrink-0">
                    <div class="bg-white border border-slate-200 px-3 py-1 rounded-full shadow-sm flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-pink-400 animate-pulse"></span>
                        <span class="text-xs sm:text-sm font-black text-slate-600" id="ex-card-counter">1 / 26</span>
                    </div>
                    <button onclick="shuffleExCards()" class="text-xs sm:text-sm font-bold text-pink-600 bg-pink-50 hover:bg-pink-100 px-3 py-1 rounded-full transition-all shadow-sm flex items-center gap-1.5">
                        <i class="fa-solid fa-dice"></i> 예문 섞기
                    </button>
                </div>
                
                <!-- Example Flashcard -->
                <div id="ex-flashcard" class="relative w-full flex-1 transform-style-3d transition-transform-700 cursor-pointer min-h-0">
                    
                    <!-- Front (Word & Korean) -->
                    <div onclick="handleExCardClick('front')" class="absolute w-full h-full backface-hidden bg-white border-2 border-slate-100 rounded-3xl flex flex-col items-center justify-center p-6 text-center shadow-lg transition-all duration-300">
                        <div class="w-12 h-12 sm:w-16 sm:h-16 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-2xl sm:text-3xl mb-4 float-animation shadow-inner flex-shrink-0">
                            <i class="fa-solid fa-pen-nib"></i>
                        </div>
                        <h2 id="ex-card-eng" class="text-4xl sm:text-5xl font-black text-slate-800 mb-2 tracking-tight"></h2>
                        <h3 id="ex-card-kor" class="text-lg sm:text-xl font-bold text-slate-500 mb-6 bg-slate-100 px-4 py-1 rounded-xl"></h3>
                        <div class="bg-pink-50 px-4 py-2 rounded-full text-pink-600 font-bold text-xs flex items-center gap-2 shadow-sm border border-pink-100 mt-auto sm:mt-0">
                            <i class="fa-solid fa-hand-pointer animate-pulse"></i> 문장 빈칸 채우기
                        </div>
                    </div>
                    
                    <!-- Back (Blank Ex & Full Ex with Korean) -->
                    <div onclick="handleExCardClick('back')" class="absolute w-full h-full backface-hidden bg-gradient-to-br from-pink-400 to-rose-400 text-white rounded-3xl rotate-y-180 flex flex-col items-center justify-center p-6 text-center shadow-xl border border-white/20 overflow-hidden">
                        
                        <div class="w-full h-full flex flex-col items-center justify-center">
                            <i class="fa-solid fa-quote-left text-3xl text-white/30 mb-4 drop-shadow-sm flex-shrink-0"></i>
                            
                            <!-- Blank Example -->
                            <p id="ex-card-blank" class="text-xl sm:text-3xl font-bold leading-relaxed text-white drop-shadow-md w-full transition-opacity duration-300 break-keep"></p>
                            
                            <!-- Full Example (Hidden initially) -->
                            <div id="ex-card-full-container" class="hidden flex flex-col items-center w-full">
                                <p id="ex-card-full" class="text-xl sm:text-3xl font-bold leading-relaxed text-white drop-shadow-md w-full break-keep mb-4"></p>
                                <!-- Korean Translation added here -->
                                <div class="bg-black/20 px-4 py-3 rounded-2xl border border-white/10 w-full shadow-inner">
                                    <p class="text-[10px] sm:text-xs text-pink-200 font-bold uppercase tracking-widest mb-1">해석</p>
                                    <p id="ex-card-kor-ex" class="text-sm sm:text-lg text-white font-medium break-keep"></p>
                                </div>
                            </div>
                            
                            <!-- Instruction -->
                            <div id="ex-instruction" class="mt-auto text-white/80 text-xs sm:text-sm font-bold flex items-center gap-2">
                                <i class="fa-solid fa-hand-pointer animate-pulse"></i> <span>정답 확인하기</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Navigation Controls -->
                <div class="flex justify-between items-center mt-3 sm:mt-4 gap-3 flex-shrink-0">
                    <button onclick="prevExCard()" class="flex-1 bg-white border-2 border-slate-200 text-slate-500 font-black text-sm sm:text-base py-3 rounded-xl shadow-sm active:scale-95 flex justify-center items-center gap-2">
                        <i class="fa-solid fa-chevron-left"></i> 이전
                    </button>
                    <button onclick="nextExCard()" class="flex-1 bg-gradient-to-r from-pink-500 to-rose-500 text-white font-black text-sm sm:text-base py-3 rounded-xl shadow-md active:scale-95 flex justify-center items-center gap-2">
                        다음 <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- SECTION: QUIZ -->
        <section id="sec-quiz" class="hidden w-full h-full flex flex-col justify-center max-w-2xl mx-auto">
             <!-- Quiz Menu -->
             <div id="quiz-menu" class="w-full flex flex-col items-center h-full justify-center">
                <div class="w-16 h-16 sm:w-20 sm:h-20 bg-gradient-to-tr from-yellow-200 to-orange-300 rounded-2xl flex items-center justify-center text-4xl text-orange-600 mb-4 transform rotate-3 flex-shrink-0">
                    <i class="fa-solid fa-medal"></i>
                </div>
                <h2 class="text-2xl sm:text-3xl font-black text-slate-800 mb-1">실력 점검 퀴즈</h2>
                <p class="text-slate-500 text-sm mb-6">모드를 선택하세요! (총 10문제)</p>
                
                <div class="grid grid-cols-2 gap-3 w-full">
                    <button onclick="startQuiz('eng2kor')" class="bg-white border-2 border-blue-100 active:border-blue-400 text-blue-800 py-4 rounded-2xl flex flex-col items-center gap-2 shadow-sm">
                        <div class="bg-blue-100 w-10 h-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-a text-lg text-blue-500"></i></div>
                        <span class="font-black text-sm sm:text-base">뜻 고르기</span>
                        <span class="text-[10px] font-bold text-blue-400">영 → 한</span>
                    </button>
                    <button onclick="startQuiz('kor2eng')" class="bg-white border-2 border-green-100 active:border-green-400 text-green-800 py-4 rounded-2xl flex flex-col items-center gap-2 shadow-sm">
                        <div class="bg-green-100 w-10 h-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-k text-lg text-green-500"></i></div>
                        <span class="font-black text-sm sm:text-base">단어 찾기</span>
                        <span class="text-[10px] font-bold text-green-400">한 → 영</span>
                    </button>
                    <button onclick="startQuiz('def2eng')" class="bg-white border-2 border-purple-100 active:border-purple-400 text-purple-800 py-4 rounded-2xl flex flex-col items-center gap-2 shadow-sm">
                        <div class="bg-purple-100 w-10 h-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-book-atlas text-lg text-purple-500"></i></div>
                        <span class="font-black text-sm sm:text-base">영영풀이</span>
                        <span class="text-[10px] font-bold text-purple-400">의미 매칭</span>
                    </button>
                    <button onclick="startQuiz('blank')" class="bg-white border-2 border-rose-100 active:border-rose-400 text-rose-800 py-4 rounded-2xl flex flex-col items-center gap-2 shadow-sm">
                        <div class="bg-rose-100 w-10 h-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-pen-clip text-lg text-rose-500"></i></div>
                        <span class="font-black text-sm sm:text-base">빈칸 채우기</span>
                        <span class="text-[10px] font-bold text-rose-400">문맥 파악</span>
                    </button>
                </div>
            </div>

            <!-- Quiz Ongoing -->
            <div id="quiz-ongoing" class="hidden w-full h-full flex flex-col">
                <div class="flex justify-between items-center mb-3 bg-white p-3 rounded-xl border border-slate-100 shadow-sm flex-shrink-0">
                    <button onclick="backToQuizMenu()" class="text-slate-400 text-xs font-bold bg-slate-50 px-2 py-1.5 rounded-lg"><i class="fa-solid fa-xmark mr-1"></i>종료</button>
                    <div class="flex items-center gap-3">
                        <div class="text-right"><span class="text-[10px] font-bold text-slate-400 block">진행도</span><span id="quiz-progress" class="font-black text-sm text-indigo-600">1/10</span></div>
                        <div class="h-6 w-px bg-slate-200"></div>
                        <div class="text-right"><span class="text-[10px] font-bold text-slate-400 block">점수</span><span class="font-black text-orange-500 text-sm" id="quiz-score">0</span></div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl border border-slate-100 p-5 sm:p-8 text-center flex-1 flex flex-col relative shadow-sm min-h-0">
                    <!-- Feedback Overlay (Absolute) -->
                    <div id="quiz-feedback" class="hidden absolute inset-x-4 top-4 z-10 p-3 rounded-xl text-center font-black text-lg shadow-md border pop-animation"></div>

                    <span id="quiz-type-label" class="inline-block text-indigo-400 font-bold text-[10px] uppercase mb-2"></span>
                    
                    <div class="flex-1 flex items-center justify-center min-h-[5rem] mb-4">
                        <h3 id="quiz-question" class="text-xl sm:text-2xl font-black text-slate-800 word-break-keep"></h3>
                    </div>
                    
                    <div id="quiz-options" class="grid grid-cols-1 gap-2 text-left w-full mt-auto"></div>
                </div>
            </div>

            <!-- Quiz Result -->
            <div id="quiz-result" class="hidden w-full h-full flex flex-col justify-center items-center text-center">
                <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm w-full">
                    <div id="result-icon" class="w-24 h-24 mx-auto rounded-2xl flex items-center justify-center text-5xl mb-4"></div>
                    <h2 class="text-2xl font-black text-slate-800 mb-2">완료!</h2>
                    <div class="text-6xl font-black text-orange-500 mb-6"><span id="final-score"></span><span class="text-2xl text-slate-300">/10</span></div>
                    <button onclick="backToQuizMenu()" class="bg-indigo-600 text-white font-black py-3 px-6 rounded-xl w-full">메뉴로 돌아가기</button>
                </div>
            </div>
        </section>

        <!-- SECTION: GAME -->
        <section id="sec-game" class="hidden w-full h-full flex flex-col justify-center max-w-lg mx-auto">
            
            <!-- Games Menu -->
            <div id="games-menu" class="w-full flex flex-col items-center h-full justify-center">
                <h2 class="text-2xl sm:text-3xl font-black text-slate-800 mb-1">미니 게임</h2>
                <p class="text-slate-500 text-sm mb-6">원하는 게임을 선택하세요!</p>
                
                <div class="grid grid-cols-2 gap-4 w-full">
                    <div class="bg-white rounded-2xl border-2 border-slate-100 p-4 sm:p-6 flex flex-col items-center text-center shadow-sm active:border-purple-300 transition-colors">
                        <div class="w-14 h-14 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center text-2xl mb-3"><i class="fa-solid fa-puzzle-piece"></i></div>
                        <h3 class="text-base sm:text-lg font-black text-slate-800 mb-1">짝맞추기</h3>
                        <p class="text-slate-400 text-[10px] sm:text-xs mb-4">의미와 단어 매칭</p>
                        <button onclick="showGameMenu('memory')" class="w-full bg-purple-600 text-white font-bold py-2 rounded-lg text-sm">시작</button>
                    </div>

                    <div class="bg-white rounded-2xl border-2 border-slate-100 p-4 sm:p-6 flex flex-col items-center text-center shadow-sm active:border-rose-300 transition-colors">
                        <div class="w-14 h-14 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center text-2xl mb-3"><i class="fa-solid fa-meteor"></i></div>
                        <h3 class="text-base sm:text-lg font-black text-slate-800 mb-1">단어 방어전</h3>
                        <p class="text-slate-400 text-[10px] sm:text-xs mb-4">요격 서바이벌</p>
                        <button onclick="showGameMenu('defense')" class="w-full bg-rose-600 text-white font-bold py-2 rounded-lg text-sm">시작</button>
                    </div>
                </div>
            </div>

            <!-- Memory Game UI -->
            <div id="game-memory-area" class="hidden w-full h-full flex flex-col">
                <div class="flex justify-between items-center mb-3 bg-white p-2 sm:p-3 rounded-xl border border-slate-100 shadow-sm flex-shrink-0">
                    <button onclick="backToGamesMenu()" class="text-slate-400 text-xs font-bold bg-slate-50 px-3 py-1.5 rounded-lg"><i class="fa-solid fa-arrow-left mr-1"></i>메뉴</button>
                    <div class="bg-indigo-50 px-3 py-1 rounded-lg flex items-center gap-2"><span class="text-[10px] text-indigo-500 font-bold">시도 횟수</span><span id="memory-moves" class="font-black text-indigo-700">0</span></div>
                </div>
                <div id="memory-board" class="grid grid-cols-4 gap-2 w-full flex-1 min-h-[250px] perspective-1000"></div>

            <!-- Defense Game UI -->
            <div id="game-defense-start" class="hidden w-full h-full flex flex-col items-center justify-center text-center bg-white rounded-3xl border border-slate-100 shadow-sm p-6">

                 <h2 class="text-2xl font-black text-slate-800 mb-4">단어 방어전</h2>
                 <p class="text-slate-500 text-xs mb-8">떨어지는 단어의 뜻을 맞추세요.<br>오답 시 <span class="text-rose-500">하트가 차감</span>됩니다!</p>
                 <div class="flex justify-center gap-3 w-full">
                    <button onclick="backToGamesMenu()" class="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl">뒤로</button>
                    <button onclick="startDefenseGame()" class="flex-1 bg-slate-800 text-white font-black py-3 rounded-xl">시작!</button>
                 </div>
            </div>

            <div id="game-defense-play" class="hidden w-full h-full flex flex-col">
                <div class="flex justify-between items-center mb-2 px-1 flex-shrink-0">
                    <div class="bg-white px-3 py-1.5 rounded-xl flex gap-1 text-rose-500 text-sm shadow-sm" id="def-lives"></div>
                    <div class="bg-slate-800 text-white font-black text-sm px-4 py-1.5 rounded-xl flex items-center gap-2 shadow-sm">SCORE <span id="def-score" class="text-yellow-400">0</span></div>
                </div>
                
                <div class="relative w-full flex-1 rounded-2xl overflow-hidden border-2 border-slate-800 bg-slate-900 transition-shadow duration-300 min-h-[200px]">
                    <div class="absolute bottom-0 w-full h-2 bg-rose-600 shadow-[0_-5px_15px_rgba(244,63,94,0.8)] z-0"></div>
                    <div id="def-container" class="absolute w-full px-2 z-10" style="top: -100px;">
                        <div id="def-box" class="bg-white border-2 border-indigo-400 p-3 rounded-xl shadow-lg max-w-[90%] mx-auto text-center transform transition-transform">
                            <p id="def-text" class="text-slate-800 font-black text-base sm:text-lg break-keep"></p>
                        </div>
                    </div>
                    <div id="def-explosion" class="absolute hidden text-5xl z-20" style="left: 50%; transform: translateX(-50%);">💥</div>

                    <div id="def-options" class="grid grid-cols-2 gap-2"></div>

                <h2 class="text-2xl font-black text-rose-500 mb-1">GAME OVER</h2>
                <div class="text-5xl font-black text-yellow-400 mb-8" id="def-final-score">0</div>

                    <button onclick="startDefenseGame()" class="w-full bg-rose-500 text-white font-black py-3 rounded-xl">다시 도전</button>
                    <button onclick="backToGamesMenu()" class="w-full bg-slate-700 text-white font-bold py-3 rounded-xl">메뉴로</button>
                </div>
            </div>

        </section>
        
    </main>

    <script>
        // Data with Korean Translations for Examples (korEx)
        const vocabData = [
            { id: 1, eng: "artwork", kor: "미술품", def: "a painting, drawing, or other piece of art", ex: "She created an artwork for the school festival.", blankEx: "She created an _______ for the school festival.", korEx: "그녀는 학교 축제를 위해 미술품을 만들었다." },
            { id: 2, eng: "century", kor: "세기, 100년", def: "a period of 100 years", ex: "The 21st century began in 2001.", blankEx: "The 21st _______ began in 2001.", korEx: "21세기는 2001년에 시작되었다." },
            { id: 3, eng: "choice", kor: "선택", def: "the act of picking or deciding between two or more possibilities", ex: "Think carefully before making a choice.", blankEx: "Think carefully before making a _______.", korEx: "선택을 하기 전에 신중하게 생각해라." },
            { id: 4, eng: "confuse", kor: "~을 …와 혼동하다", def: "to mistakenly think that one thing is another thing because they seem similar", ex: "Don’t confuse quantity with quality.", blankEx: "Don’t _______ quantity with quality.", korEx: "양과 질을 혼동하지 마라." },
            { id: 5, eng: "dark", kor: "어두운, 짙은", def: "having little or no light; deep in color", ex: "It is too dark outside at night.", blankEx: "It is too _______ outside at night.", korEx: "밤에는 밖이 너무 어둡다." },
            { id: 6, eng: "differ", kor: "다르다", def: "to be not the same as something or someone else", ex: "Your opinion may differ from mine.", blankEx: "Your opinion may _______ from mine.", korEx: "너의 의견은 내 것과 다를지도 모른다." },
            { id: 7, eng: "difference", kor: "차이, 다름", def: "the way in which two or more things are not the same", ex: "What’s the difference between a frog and a toad?", blankEx: "What’s the _______ between a frog and a toad?", korEx: "개구리와 두꺼비의 차이점은 무엇인가?" },
            { id: 8, eng: "exhibit", kor: "전시회", def: "a public display of art, objects, or information for people to view", ex: "You can see the history of dinosaurs at the exhibit.", blankEx: "You can see the history of dinosaurs at the _______.", korEx: "너는 전시회에서 공룡의 역사를 볼 수 있다." },
            { id: 9, eng: "focus", kor: "초점, 중점; 집중하다", def: "the center of attention or activity; the main point / to give all your attention to something", ex: "You should focus on your studies.", blankEx: "You should _______ on your studies.", korEx: "너는 학업에 집중해야 한다." },
            { id: 10, eng: "helpful", kor: "도움이 되는", def: "giving help or being useful to someone", ex: "It is helpful to study a little every day.", blankEx: "It is _______ to study a little every day.", korEx: "매일 조금씩 공부하는 것은 도움이 된다." },
            { id: 11, eng: "instead", kor: "대신에", def: "in place of someone or something; as another choice", ex: "I didn’t go to the park; I stayed home instead.", blankEx: "I didn’t go to the park; I stayed home _______.", korEx: "나는 공원에 가지 않았다; 대신에 집에 머물렀다." },
            { id: 12, eng: "landscape", kor: "풍경, 풍경화", def: "a view of an area of land, or a picture showing a view of the countryside", ex: "The artist painted a beautiful landscape of the lake.", blankEx: "The artist painted a beautiful _______ of the lake.", korEx: "그 화가는 호수의 아름다운 풍경화를 그렸다." },
            { id: 13, eng: "light", kor: "(색깔이) 연한, 옅은", def: "pale or not dark in color", ex: "She wore a light blue dress to the party.", blankEx: "She wore a _______ blue dress to the party.", korEx: "그녀는 파티에 연한 파란색 드레스를 입고 갔다." },
            { id: 14, eng: "master", kor: "대가, 달인", def: "a person who is very skilled at something", ex: "Leonardo da Vinci was truly a master of art.", blankEx: "Leonardo da Vinci was truly a _______ of art.", korEx: "레오나르도 다빈치는 진정으로 예술의 대가였다." },
            { id: 15, eng: "mix up", kor: "혼동하다, 헷갈리다", def: "to confuse one thing or person with another", ex: "She mixed up salt with sugar.", blankEx: "She _______ salt with sugar.", korEx: "그녀는 소금과 설탕을 혼동했다." },
            { id: 16, eng: "nature", kor: "자연", def: "the physical world including all plants, animals, landscapes, and things not made by people", ex: "We went on a hike to enjoy the beauty of nature.", blankEx: "We went on a hike to enjoy the beauty of _______.", korEx: "우리는 자연의 아름다움을 즐기기 위해 하이킹을 갔다." },
            { id: 17, eng: "praise", kor: "칭찬하다", def: "to say that someone or something is good or has done well", ex: "The teacher praised the student for his hard work.", blankEx: "The teacher _______ the student for his hard work.", korEx: "선생님은 그의 노력을 칭찬했다." },
            { id: 18, eng: "probably", kor: "아마", def: "used to say that something is likely to happen or be true", ex: "I'll take an umbrella because it'll probably rain.", blankEx: "I'll take an umbrella because it'll _______ rain.", korEx: "아마 비가 올 것이기 때문에 나는 우산을 가져갈 것이다." },
            { id: 19, eng: "realize", kor: "깨닫다, 알아차리다", def: "to become aware of something or understand something that you did not know before", ex: "I didn’t realize that yesterday was my sister’s birthday.", blankEx: "I didn’t _______ that yesterday was my sister’s birthday.", korEx: "나는 어제가 여동생의 생일이라는 것을 깨닫지 못했다." },
            { id: 20, eng: "series", kor: "연속물", def: "a number of things or events that come one after another in order", ex: "I watched a series of superhero movies.", blankEx: "I watched a _______ of superhero movies.", korEx: "나는 일련의 슈퍼히어로 영화들을 보았다." },
            { id: 21, eng: "similar", kor: "비슷한, 닮은", def: "almost the same but not exactly the same", ex: "We have similar tastes in music.", blankEx: "We have _______ tastes in music.", korEx: "우리는 음악에 비슷한 취향을 가지고 있다." },
            { id: 22, eng: "sound", kor: "~하게 들리다", def: "to seem or appear when you hear it", ex: "That song sounds amazing!", blankEx: "That song _______ amazing!", korEx: "그 노래는 멋지게 들린다!" },
            { id: 23, eng: "strange", kor: "이상한", def: "unusual or surprising in a way that is difficult to understand", ex: "I found something strange on the street.", blankEx: "I found something _______ on the street.", korEx: "나는 길에서 이상한 것을 발견했다." },
            { id: 24, eng: "subject", kor: "대상, 주제", def: "a person or thing that is being discussed, studied, or dealt with", ex: "Focus the camera on the subject.", blankEx: "Focus the camera on the _______.", korEx: "카메라의 초점을 대상에 맞춰라." },
            { id: 25, eng: "tell apart", kor: "~을 구별하다", def: "to see or notice the difference between two or more people or things", ex: "The brothers look so similar that I can’t tell them apart.", blankEx: "The brothers look so similar that I can’t _______ them apart.", korEx: "그 형제들은 너무 비슷하게 생겨서 나는 그들을 구별할 수 없다." },
            { id: 26, eng: "unique", kor: "독특한", def: "being the only one of its kind; different from everything else", ex: "She has a unique style of painting.", blankEx: "She has a _______ style of painting.", korEx: "그녀는 독특한 그림 스타일을 가지고 있다." }
        ];

        function switchTab(tabId) {
            quitDefenseGame(); 
            document.querySelectorAll('main > section').forEach(sec => sec.classList.add('hidden'));
            document.getElementById(`sec-${tabId}`).classList.remove('hidden');

            const activeClass = ['bg-gradient-to-r', 'from-purple-100', 'to-pink-100', 'text-purple-700', 'shadow-sm'];
            const inactiveClass = ['text-slate-500', 'hover:bg-slate-50', 'hover:text-slate-800'];

            ['learn', 'example', 'quiz', 'game'].forEach(id => {
                const btn = document.getElementById(`tab-${id}`);
                if (id === tabId) {
                    btn.classList.add(...activeClass);
                    btn.classList.remove(...inactiveClass);
                } else {
                    btn.classList.remove(...activeClass);
                    btn.classList.add(...inactiveClass);
                }
            });
        }

        /* ================= LEARN TAB LOGIC ================= */
        let currentCardIndex = 0;
        let learnOrder = [...vocabData];
        let cardState = 0; 

        function shuffleCards() {
            learnOrder = learnOrder.sort(() => Math.random() - 0.5);
            currentCardIndex = 0;
            resetCardStateToFront();
            setTimeout(renderCard, 200);
        }

        function renderCard() {
            const word = learnOrder[currentCardIndex];
            document.getElementById('card-eng').textContent = word.eng;
            document.getElementById('card-kor').textContent = word.kor;
            document.getElementById('card-def').textContent = word.def;
            document.getElementById('card-counter').textContent = `${currentCardIndex + 1} / ${learnOrder.length}`;
        }

        function handleCardClick(side) {
            const flashcard = document.getElementById('flashcard');
            const defContainer = document.getElementById('card-def-container');
            const instruction = document.getElementById('card-instruction');
            const korText = document.getElementById('card-kor');

            if (side === 'front' && cardState === 0) {
                flashcard.classList.add('rotate-y-180');
                korText.className = 'text-5xl sm:text-6xl font-black text-white drop-shadow-md z-10 transition-all duration-500 mb-0 leading-tight';
                instruction.innerHTML = '<i class="fa-solid fa-hand-pointer animate-pulse"></i> <span>클릭해서 영영풀이 보기</span>';
                cardState = 1;
            } else if (side === 'back' && cardState === 1) {
                defContainer.classList.remove('details-hidden');
                defContainer.classList.add('details-visible');
                korText.className = 'text-3xl sm:text-4xl font-black text-white drop-shadow-md z-10 transition-all duration-500 mb-2 leading-tight';
                instruction.innerHTML = '<i class="fa-solid fa-rotate-left mr-1"></i> 앞면으로 돌아가기';
                cardState = 2;
            } else if (side === 'back' && cardState === 2) {
                resetCardStateToFront();
            }
        }

        function resetCardStateToFront() {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.remove('rotate-y-180');
            cardState = 0;
            
            setTimeout(() => {
                document.getElementById('card-def-container').classList.remove('details-visible');
                document.getElementById('card-def-container').classList.add('details-hidden');
                document.getElementById('card-kor').className = 'text-5xl sm:text-6xl font-black text-white drop-shadow-md z-10 transition-all duration-500 mb-0 leading-tight';
            }, 300);
        }

        function nextCard() { resetCardStateToFront(); setTimeout(() => { currentCardIndex = (currentCardIndex + 1) % learnOrder.length; renderCard(); }, 200); }
        function prevCard() { resetCardStateToFront(); setTimeout(() => { currentCardIndex = (currentCardIndex - 1 + learnOrder.length) % learnOrder.length; renderCard(); }, 200); }

        /* ================= EXAMPLE TAB LOGIC ================= */
        let currentExIndex = 0;
        let exOrder = [...vocabData];
        let exCardState = 0; 

        function shuffleExCards() {
            exOrder.sort(() => Math.random() - 0.5);
            currentExIndex = 0;
            resetExCardToFront();
            setTimeout(renderExCard, 200);
        }

        function renderExCard() {
            const w = exOrder[currentExIndex];
            document.getElementById('ex-card-eng').textContent = w.eng;
            document.getElementById('ex-card-kor').textContent = w.kor;
            
            const blankHtml = w.blankEx.replace('_______', '<span class="inline-block w-16 sm:w-20 border-b-2 border-white/50 align-middle"></span>');
            document.getElementById('ex-card-blank').innerHTML = blankHtml;
            
            const baseWord = w.eng.split(' ')[0]; 
            const fullHtml = w.ex.replace(new RegExp(`(${baseWord}[a-z]*)`, 'i'), '<span class="text-yellow-300 font-black underline decoration-2 underline-offset-4">$1</span>');
            document.getElementById('ex-card-full').innerHTML = fullHtml;
            document.getElementById('ex-card-kor-ex').textContent = w.korEx; // Korean Translation
            
            document.getElementById('ex-card-counter').textContent = `${currentExIndex + 1} / ${exOrder.length}`;
        }

        function handleExCardClick(side) {
            const card = document.getElementById('ex-flashcard');
            const blankEl = document.getElementById('ex-card-blank');
            const fullElContainer = document.getElementById('ex-card-full-container');
            const inst = document.getElementById('ex-instruction');

            if (side === 'front' && exCardState === 0) {
                card.classList.add('rotate-y-180');
                fullElContainer.classList.add('hidden');
                blankEl.classList.remove('hidden');
                inst.innerHTML = '<i class="fa-solid fa-hand-pointer animate-pulse"></i> <span>정답 및 해석 확인</span>';
                exCardState = 1;
            } else if (side === 'back' && exCardState === 1) {
                blankEl.classList.add('hidden');
                fullElContainer.classList.remove('hidden');
                inst.innerHTML = '<i class="fa-solid fa-rotate-left mr-1"></i> 앞으로 돌아가기';
                exCardState = 2;
            } else if (side === 'back' && exCardState === 2) {
                resetExCardToFront();
            }
        }

        function resetExCardToFront() {
            const card = document.getElementById('ex-flashcard');
            card.classList.remove('rotate-y-180');
            exCardState = 0;
            
            setTimeout(() => {
                document.getElementById('ex-card-full-container').classList.add('hidden');
                document.getElementById('ex-card-blank').classList.remove('hidden');
                document.getElementById('ex-instruction').innerHTML = '<i class="fa-solid fa-hand-pointer animate-pulse"></i> <span>정답 및 해석 확인</span>';
            }, 300);
        }

        function nextExCard() { resetExCardToFront(); setTimeout(() => { currentExIndex = (currentExIndex + 1) % exOrder.length; renderExCard(); }, 200); }
        function prevExCard() { resetExCardToFront(); setTimeout(() => { currentExIndex = (currentExIndex - 1 + exOrder.length) % exOrder.length; renderExCard(); }, 200); }


        /* ================= QUIZ LOGIC ================= */
        let currentQuizQuestions = [], currentQuizIndex = 0, quizScore = 0, quizMode = '';
        let quizTimeout; // Auto-advance timer
        const TOTAL_QUIZ_QUESTIONS = 10;

        function startQuiz(mode) {
            quizMode = mode; quizScore = 0; currentQuizIndex = 0; clearTimeout(quizTimeout);
            currentQuizQuestions = [...vocabData].sort(() => Math.random() - 0.5).slice(0, TOTAL_QUIZ_QUESTIONS).map(targetWord => {
                let options = [targetWord, ...[...vocabData].filter(w => w.id !== targetWord.id).sort(() => Math.random() - 0.5).slice(0,3)].sort(() => Math.random() - 0.5);
                return { target: targetWord, options: options };
            });
            
            document.getElementById('quiz-menu').classList.add('hidden');
            document.getElementById('quiz-result').classList.add('hidden');
            document.getElementById('quiz-ongoing').classList.remove('hidden');
            
            document.getElementById('quiz-type-label').textContent = mode === 'eng2kor' ? "단어 뜻 맞추기" : mode === 'kor2eng' ? "단어 찾기" : mode === 'def2eng' ? "영영풀이 매칭" : "빈칸 채우기";
            renderQuizQuestion();
        }

        function renderQuizQuestion() {
            clearTimeout(quizTimeout);
            const qData = currentQuizQuestions[currentQuizIndex];
            const qEl = document.getElementById('quiz-question');
            qEl.innerHTML = quizMode === 'eng2kor' ? qData.target.eng : quizMode === 'kor2eng' ? qData.target.kor : quizMode === 'def2eng' ? `"${qData.target.def}"` : qData.target.blankEx.replace('_______', '<span class="text-indigo-400 underline decoration-4 underline-offset-4">_______</span>');
            
            document.getElementById('quiz-progress').textContent = `${currentQuizIndex + 1}/10`;
            document.getElementById('quiz-score').textContent = quizScore * 10;
            
            const optsEl = document.getElementById('quiz-options'); optsEl.innerHTML = '';
            const fbEl = document.getElementById('quiz-feedback'); fbEl.classList.add('hidden'); fbEl.classList.remove('pop-animation');

            qData.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                const optText = quizMode === 'eng2kor' ? opt.kor : opt.eng;
                btn.className = 'w-full bg-slate-50 border-2 border-slate-200 hover:border-indigo-400 text-slate-700 font-bold py-3 px-4 rounded-xl text-left flex items-center gap-3 quiz-btn transition-colors text-sm sm:text-base';
                btn.innerHTML = `<span class="bg-indigo-100 text-indigo-600 w-6 h-6 rounded flex items-center justify-center font-black shrink-0 text-xs">${String.fromCharCode(65 + idx)}</span> <span>${optText}</span>`;
                btn.onclick = () => checkQuiz(opt.id, qData.target.id, btn);
                optsEl.appendChild(btn);
            });
        }

        function checkQuiz(selId, tgtId, btnEl) {
            document.querySelectorAll('.quiz-btn').forEach(b => b.disabled = true);
            const fbEl = document.getElementById('quiz-feedback');
            
            if (selId === tgtId) {
                quizScore++;
                btnEl.className = 'w-full bg-emerald-50 border-2 border-emerald-500 text-emerald-800 font-bold py-3 px-4 rounded-xl text-left flex items-center gap-3 shadow-md text-sm sm:text-base';
                btnEl.querySelector('span').className = 'bg-emerald-500 text-white w-6 h-6 rounded flex items-center justify-center font-black shrink-0 text-xs';
                fbEl.innerHTML = "<i class='fa-solid fa-face-laugh-beam mr-1'></i>정답입니다!";
                fbEl.className = "absolute inset-x-4 top-4 z-10 p-3 rounded-xl text-center font-black text-lg shadow-md border pop-animation block bg-emerald-100 text-emerald-700 border-emerald-300";
            } else {
                btnEl.className = 'w-full bg-rose-50 border-2 border-rose-500 text-rose-800 font-bold py-3 px-4 rounded-xl text-left flex items-center gap-3 shake-animation shadow-md text-sm sm:text-base';
                btnEl.querySelector('span').className = 'bg-rose-500 text-white w-6 h-6 rounded flex items-center justify-center font-black shrink-0 text-xs';
                fbEl.innerHTML = "<i class='fa-solid fa-face-frown mr-1'></i>틀렸습니다.";
                fbEl.className = "absolute inset-x-4 top-4 z-10 p-3 rounded-xl text-center font-black text-lg shadow-md border block bg-rose-100 text-rose-700 border-rose-300";
                
                // Highlight correct
                document.querySelectorAll('.quiz-btn').forEach(b => {
                    let optText = quizMode === 'eng2kor' ? currentQuizQuestions[currentQuizIndex].target.kor : currentQuizQuestions[currentQuizIndex].target.eng;
                    if (b.innerText.includes(optText)) {
                        b.className = 'w-full bg-emerald-50/50 border-2 border-emerald-400 border-dashed text-emerald-700 font-bold py-3 px-4 rounded-xl text-left flex items-center gap-3 text-sm sm:text-base';
                        b.querySelector('span').className = 'bg-emerald-400 text-white w-6 h-6 rounded flex items-center justify-center font-black shrink-0 text-xs';
                    }
                });
            }
            document.getElementById('quiz-score').textContent = quizScore * 10;
            
            // 2 seconds delay to let user see feedback
            quizTimeout = setTimeout(nextQuizQuestion, 2000);
        }

        function nextQuizQuestion() {
            currentQuizIndex++;
            if (currentQuizIndex < TOTAL_QUIZ_QUESTIONS) renderQuizQuestion();
            else {
                document.getElementById('quiz-ongoing').classList.add('hidden');
                document.getElementById('quiz-result').classList.remove('hidden');
                document.getElementById('result-icon').innerHTML = quizScore >= 8 ? '<i class="fa-solid fa-crown text-yellow-500"></i>' : '<i class="fa-solid fa-thumbs-up text-blue-500"></i>';
                document.getElementById('result-icon').className = quizScore >= 8 ? 'w-24 h-24 mx-auto rounded-2xl flex items-center justify-center text-5xl mb-4 bg-yellow-100 transform rotate-6' : 'w-24 h-24 mx-auto rounded-2xl flex items-center justify-center text-5xl mb-4 bg-blue-100 transform -rotate-6';
                document.getElementById('final-score').textContent = quizScore;
            }
        }
        function backToQuizMenu() { clearTimeout(quizTimeout); document.getElementById('quiz-ongoing').classList.add('hidden'); document.getElementById('quiz-result').classList.add('hidden'); document.getElementById('quiz-menu').classList.remove('hidden'); }


        /* ================= GAME MENU LOGIC ================= */
        function showGameMenu(type) {
            document.getElementById('games-menu').classList.add('hidden');
            if(type === 'memory') {
                document.getElementById('game-memory-area').classList.remove('hidden');
                initMemoryGame();
            } else {
                document.getElementById('game-defense-start').classList.remove('hidden');
            }
        }

        function backToGamesMenu() {
            quitDefenseGame(); 
            document.getElementById('game-memory-area').classList.add('hidden');
            document.getElementById('game-defense-start').classList.add('hidden');
            document.getElementById('game-defense-play').classList.add('hidden');
            document.getElementById('game-defense-over').classList.add('hidden');
            document.getElementById('games-menu').classList.remove('hidden');
        }

        /* ================= MEMORY GAME LOGIC ================= */
        let hasFlipped = false, lockBoard = false, firstCard, secondCard, matchedPairs = 0, memMoves = 0;
        
        function initMemoryGame() {
            const board = document.getElementById('memory-board');
            board.innerHTML = '';
            hasFlipped = lockBoard = false; firstCard = secondCard = null; matchedPairs = memMoves = 0;
            document.getElementById('memory-moves').textContent = memMoves;
            
            let selected = [...vocabData].sort(() => Math.random() - 0.5).slice(0, 8);
            let cards = [];
            selected.forEach(w => { cards.push({ id: w.id, text: w.eng, type: 'eng' }); cards.push({ id: w.id, text: w.kor, type: 'kor' }); });
            cards.sort(() => Math.random() - 0.5);
            
            cards.forEach(card => {
                const el = document.createElement('div');
                el.className = 'memory-card'; el.dataset.id = card.id;
                el.innerHTML = `<div class="memory-card-inner"><div class="memory-card-front"><i class="fa-solid fa-question opacity-50 text-xl"></i></div><div class="memory-card-back text-xs sm:text-sm leading-tight px-1">${card.text}</div></div>`;
                el.addEventListener('click', flipMemCard);
                board.appendChild(el);
            });
        }

        function flipMemCard() {
            if (lockBoard || this === firstCard) return;
            this.classList.add('flipped');
            if (!hasFlipped) { hasFlipped = true; firstCard = this; return; }
            secondCard = this; memMoves++; document.getElementById('memory-moves').textContent = memMoves;
            firstCard.dataset.id === secondCard.dataset.id ? disableMemCards() : unflipMemCards();
        }

        function disableMemCards() {
            firstCard.removeEventListener('click', flipMemCard); secondCard.removeEventListener('click', flipMemCard);
            firstCard.classList.add('matched'); secondCard.classList.add('matched');
            matchedPairs++;
            if(matchedPairs === 8) setTimeout(() => alert(`완료! 시도 횟수: ${memMoves}`), 500);
            hasFlipped = lockBoard = false; firstCard = secondCard = null;
        }

        function unflipMemCards() {
            lockBoard = true;
            setTimeout(() => { firstCard.classList.remove('flipped'); secondCard.classList.remove('flipped'); hasFlipped = lockBoard = false; firstCard = secondCard = null; }, 1000);
        }

        /* ================= DEFENSE GAME LOGIC ================= */
        let defLoop = null, defScore = 0, defLives = 3, fallingY = -100, defSpeed = 0.5, currentDefTgt = null, isDefAnim = false;
        const cDef = document.getElementById('def-container'), tDef = document.getElementById('def-text'), oDef = document.getElementById('def-options');

        function startDefenseGame() {
            document.getElementById('game-defense-start').classList.add('hidden');
            document.getElementById('game-defense-over').classList.add('hidden');
            document.getElementById('game-defense-play').classList.remove('hidden');
            defScore = 0; defLives = 3; defSpeed = 0.4; // Starts slower for compact height
            updateDefUI(); spawnDefWord();
            if(defLoop) clearInterval(defLoop);
            defLoop = setInterval(defTick, 20);
        }

        function updateDefUI() {
            document.getElementById('def-score').textContent = defScore;
            const livesEl = document.getElementById('def-lives'); livesEl.innerHTML = '';
            for(let i=0; i<3; i++) livesEl.innerHTML += i < defLives ? '<i class="fa-solid fa-heart"></i>' : '<i class="fa-solid fa-heart-crack text-slate-300"></i>';
        }

        function spawnDefWord() {
            if(defLives <= 0) return;
            isDefAnim = false; currentDefTgt = vocabData[Math.floor(Math.random() * vocabData.length)];
            fallingY = -50; cDef.style.top = fallingY + 'px'; cDef.classList.remove('hidden');
            
            const isKor = Math.random() > 0.4;
            tDef.textContent = isKor ? currentDefTgt.kor : currentDefTgt.def;
            tDef.className = isKor ? "text-slate-800 font-black text-lg break-keep leading-tight" : "text-slate-700 font-bold text-xs sm:text-sm italic break-words leading-tight";
            
            defSpeed = 0.4 + (defScore * 0.012); 

            let opts = [currentDefTgt, ...[...vocabData].filter(w => w.id !== currentDefTgt.id).sort(() => Math.random()-0.5).slice(0,3)].sort(() => Math.random()-0.5);
            oDef.innerHTML = '';
            opts.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'w-full bg-slate-800 border-2 border-slate-600 text-white font-bold py-3 rounded-xl text-xs sm:text-sm hover:bg-indigo-600 transition-colors';
                b.textContent = opt.eng; b.onclick = () => checkDefClick(opt.id, b);
                oDef.appendChild(b);
            });
        }

        function defTick() {
            if(isDefAnim) return;
            fallingY += defSpeed; cDef.style.top = fallingY + 'px';
            
            // Dynamic hit detection based on container height
            const containerHeight = document.getElementById('game-defense-play').querySelector('.relative').clientHeight;
            if (fallingY > containerHeight - 60) { 
                defLives--; updateDefUI();
                const pa = document.getElementById('game-defense-play').querySelector('.relative');
                pa.classList.add('border-rose-500'); 
                pa.style.boxShadow = "inset 0 0 30px rgba(244,63,94,0.8)";
                setTimeout(() => { pa.classList.remove('border-rose-500'); pa.style.boxShadow = ""; }, 200);
                if (defLives <= 0) overDefGame(); else spawnDefWord();
            }
        }

        function checkDefClick(sId, btn) {
            if (isDefAnim) return;
            if (sId === currentDefTgt.id) {
                isDefAnim = true; defScore += 10; updateDefUI();
                btn.className = 'w-full bg-emerald-500 border-2 border-emerald-400 text-white font-black py-3 rounded-xl text-xs sm:text-sm';
                cDef.classList.add('hidden');
                
                const exp = document.getElementById('def-explosion');
                exp.style.top = fallingY + 'px'; exp.classList.remove('hidden');
                setTimeout(() => { exp.classList.add('hidden'); spawnDefWord(); }, 400);
            } else {
                defLives--; updateDefUI();
                
                const pa = document.getElementById('game-defense-play').querySelector('.relative');
                pa.classList.add('border-rose-500'); 
                pa.style.boxShadow = "inset 0 0 30px rgba(244,63,94,0.8)";
                setTimeout(() => { pa.classList.remove('border-rose-500'); pa.style.boxShadow = ""; }, 200);

                btn.className = 'w-full bg-rose-600 border-2 border-rose-500 text-white font-bold py-3 rounded-xl shake-animation text-xs sm:text-sm';
                setTimeout(() => {
                    btn.className = 'w-full bg-slate-800 border-2 border-slate-600 text-white font-bold py-3 rounded-xl text-xs sm:text-sm hover:bg-indigo-600 transition-colors';
                }, 400);

                if (defLives <= 0) overDefGame();
            }
        }

        function overDefGame() {
            clearInterval(defLoop); defLoop = null;
            document.getElementById('game-defense-play').classList.add('hidden');
            document.getElementById('game-defense-over').classList.remove('hidden');
            document.getElementById('def-final-score').textContent = defScore;
        }

        function quitDefenseGame() {
            if(defLoop) clearInterval(defLoop); defLoop = null;
        }

        window.onload = () => { 
            renderCard(); 
            renderExCard(); 
        };
    </script>
</body>
</html>
